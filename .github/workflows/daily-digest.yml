name: Gmail 메일 정리

on:
  # 매일 오전 10시 30분 KST (01:30 UTC)
  # 정각/00 UTC는 GitHub Actions 큐 경합이 심해 1~3시간 지연되므로 30분 슬롯 사용
  schedule:
    - cron: '30 1 * * *'

  # 수동 실행 버튼
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'today'
        type: choice
        options:
          - today        # 오늘 0시부터 현재까지
          - last-24h     # 24시간 전부터 현재까지
          - custom       # 특정 날짜

      custom_date:
        description: '특정 날짜 (YYYY-MM-DD, custom 모드일 때만)'
        required: false
        default: ''

      labels:
        description: '처리할 라벨 (쉼표 구분, 비우면 전체)'
        required: false
        default: ''

# SKILL 파일 자동 커밋을 위한 권한
permissions:
  contents: write

# 동시 실행 방지 (이전 실행이 끝날 때까지 대기)
concurrency:
  group: gmail-digest
  cancel-in-progress: false

jobs:
  process-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check secrets
        id: check-secrets
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          MISSING=""

          # LLM API 키: 최소 하나는 필요
          if [ -z "$OPENROUTER_API_KEY" ] && [ -z "$GOOGLE_AI_API_KEY" ]; then
            MISSING="${MISSING}LLM API 키(OPENROUTER_API_KEY 또는 GOOGLE_AI_API_KEY 중 하나), "
          fi

          if [ -z "$GMAIL_CREDENTIALS" ]; then
            MISSING="${MISSING}GMAIL_CREDENTIALS, "
          fi

          if [ -z "$GMAIL_TOKEN" ]; then
            MISSING="${MISSING}GMAIL_TOKEN, "
          fi

          if [ -n "$MISSING" ]; then
            echo "=========================================="
            echo "  GitHub Actions 설정이 필요합니다"
            echo "=========================================="
            echo ""
            echo "누락된 Secrets: ${MISSING%,*}"
            echo ""
            echo "설정 방법:"
            echo "1. Repository → Settings → Secrets and variables → Actions"
            echo "2. 다음 Secrets 추가:"
            echo "   - GOOGLE_AI_API_KEY: Google AI Studio API 키 (권장)"
            echo "   - OPENROUTER_API_KEY: OpenRouter API 키 (폴백용)"
            echo "   - GMAIL_CREDENTIALS: client_secret.json 내용"
            echo "   - GMAIL_TOKEN: token.json 내용"
            echo ""
            echo "자세한 내용은 README.md 참조"
            echo "=========================================="
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 시작 알림
        id: start-notify
        if: steps.check-secrets.outputs.skip != 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.custom_date }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # 소요시간 계산용 시작 시각 저장
          echo "start_epoch=$(date +%s)" >> $GITHUB_OUTPUT

          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "TELEGRAM_TOKEN이 설정되지 않아 시작 알림을 건너뜁니다."
            exit 0
          fi

          # 모드 결정
          if [ "$EVENT_NAME" = "schedule" ]; then
            MODE="schedule"
          else
            MODE="${INPUT_MODE:-today}"
          fi

          # 모드 한글 표시
          case "$MODE" in
            schedule) MODE_KR="스케줄 (전일)" ;;
            today)    MODE_KR="오늘" ;;
            last-24h) MODE_KR="최근 24시간" ;;
            custom)   MODE_KR="지정일" ;;
            *)        MODE_KR="$MODE" ;;
          esac

          # 대상 날짜
          if [ "$MODE" = "custom" ] && [ -n "$INPUT_DATE" ]; then
            TARGET_DATE="$INPUT_DATE"
          else
            TARGET_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          fi

          MESSAGE=$(printf "[YKS Newsletter Report] 생성을 시작합니다.\n\n📅 %s\n📋 모드: %s" "$TARGET_DATE" "$MODE_KR")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode=HTML

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install

      - name: Gmail 메일 정리 실행
        if: steps.check-secrets.outputs.skip != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          USER_PROFILE: ${{ secrets.USER_PROFILE }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_CUSTOM_DATE: ${{ github.event.inputs.custom_date }}
          INPUT_LABELS: ${{ github.event.inputs.labels }}
        run: |
          # .env 파일 생성
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" > .env
          echo "GOOGLE_AI_API_KEY=$GOOGLE_AI_API_KEY" >> .env

          # Gmail credentials 저장 (config/credentials/ 경로로 통일)
          mkdir -p config/credentials
          echo "$GMAIL_CREDENTIALS" > config/credentials/client_secret.json
          echo "$GMAIL_TOKEN" > config/credentials/token.json

          # 사용자 프로필 저장 (인사이트 개인화용)
          if [ -n "$USER_PROFILE" ]; then
            echo "$USER_PROFILE" > config/user_profile.json
          fi

          # 실행 모드 결정
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 자동 실행
            node scripts/orchestrator.js --mode schedule
          else
            # 수동 실행 입력 검증 (쉘 인젝션 방지)

            # mode 화이트리스트
            case "$INPUT_MODE" in
              today|last-24h|custom|schedule) ;;
              *)
                echo "ERROR: 잘못된 mode 값: $INPUT_MODE"
                exit 1
                ;;
            esac

            # custom_date 형식 검증 (YYYY-MM-DD)
            if [ -n "$INPUT_CUSTOM_DATE" ]; then
              if ! echo "$INPUT_CUSTOM_DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                echo "ERROR: 잘못된 날짜 형식 (YYYY-MM-DD 필요): $INPUT_CUSTOM_DATE"
                exit 1
              fi
            fi

            # labels 형식 검증 (한글/영문/숫자/쉼표/언더스코어/하이픈만 허용)
            if [ -n "$INPUT_LABELS" ]; then
              if ! echo "$INPUT_LABELS" | grep -qE '^[a-zA-Z0-9_,/가-힣-]+$'; then
                echo "ERROR: 잘못된 labels 형식 (영문/숫자/한글/쉼표만 허용): $INPUT_LABELS"
                exit 1
              fi
            fi

            # 검증된 인자로 실행 (쉘 분리 안전)
            ARGS=(--mode "$INPUT_MODE")
            if [ -n "$INPUT_CUSTOM_DATE" ]; then
              ARGS+=(--date "$INPUT_CUSTOM_DATE")
            fi
            if [ -n "$INPUT_LABELS" ]; then
              ARGS+=(--labels "$INPUT_LABELS")
            fi

            node scripts/orchestrator.js "${ARGS[@]}"
          fi

      - name: SKILL 파일 및 설정 커밋
        if: success() && steps.check-secrets.outputs.skip != 'true'
        continue-on-error: true
        run: |
          # Git 설정
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 변경된 SKILL 파일과 newsletters.json 확인
          SKILL_CHANGES=$(git status --porcelain skills/newsletters/ 2>/dev/null | wc -l)
          CONFIG_CHANGES=$(git status --porcelain config/newsletters.json 2>/dev/null | wc -l)

          if [ "$SKILL_CHANGES" -gt 0 ] || [ "$CONFIG_CHANGES" -gt 0 ]; then
            echo "새로운 SKILL 파일 또는 설정 변경 감지됨"

            # 파일 추가
            git add skills/newsletters/*.md 2>/dev/null || true
            git add config/newsletters.json 2>/dev/null || true

            # 커밋 (변경사항이 있을 때만)
            git diff --staged --quiet || git commit -m "chore: 새 뉴스레터 SKILL 자동 생성"

            # remote 변경사항 반영 후 푸시 (conflict 시 abort 후 재시도)
            if ! git pull --rebase; then
              echo "Rebase conflict 발생, abort 후 merge 방식으로 재시도"
              git rebase --abort
              git pull --no-rebase --strategy-option theirs || true
            fi
            git push || echo "SKILL 푸시 실패 (메일 정리 자체는 정상 완료)"
            echo "SKILL 파일 커밋 완료"
          else
            echo "새로운 SKILL 파일 없음, 건너뜀"
          fi

      - name: 결과물 업로드 (Artifacts - 백업용)
        if: success() && steps.check-secrets.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mail-digest-${{ github.run_number }}
          path: |
            output/final/**/*.md
            output/final/**/*.html
          retention-days: 30

      - name: HTML을 GitHub Pages에 배포 + 인덱스 생성
        if: success() && steps.check-secrets.outputs.skip != 'true'
        id: pages-deploy
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.custom_date }}
        run: |
          # 대상 날짜 결정
          if [ "$INPUT_MODE" = "custom" ] && [ -n "$INPUT_DATE" ]; then
            RUN_ID=$(echo "$INPUT_DATE" | tr -d '-')
            TARGET_DATE="$INPUT_DATE"
          else
            RUN_ID=$(TZ='Asia/Seoul' date '+%Y%m%d')
            TARGET_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          fi

          RUN_DIR="output/final/${RUN_ID}"
          if [ ! -d "$RUN_DIR" ]; then
            echo "결과물 폴더 없음, GitHub Pages 배포 건너뜀"
            echo "deployed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          HTML_FILE=$(find "$RUN_DIR" -name "*_Newsletter_report.html" 2>/dev/null | head -1)
          if [ -z "$HTML_FILE" ]; then
            echo "통합 HTML 파일 없음, GitHub Pages 배포 건너뜀"
            echo "deployed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # gh-pages 브랜치를 worktree로 체크아웃
          git fetch origin gh-pages
          git worktree add _ghpages gh-pages

          # reports 디렉토리 보장
          mkdir -p _ghpages/reports
          [ -f _ghpages/.nojekyll ] || touch _ghpages/.nojekyll

          # HTML 복사 (파일명: YYYY-MM-DD.html)
          TARGET_HTML="_ghpages/reports/${TARGET_DATE}.html"
          cp "$HTML_FILE" "$TARGET_HTML"

          # 인덱스 페이지 재생성 (base-dir을 gh-pages worktree로 지정)
          node scripts/generate_index_page.js --base-dir _ghpages

          # gh-pages 브랜치에 커밋/푸시 (worktree 내부에서 실행)
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          cd _ghpages
          git add -A
          if git diff --staged --quiet; then
            echo "gh-pages: 변경사항 없음"
          else
            git commit -m "report: ${TARGET_DATE} 뉴스레터 리포트 추가" || true
            # remote 변경사항 반영 후 푸시
            if ! git pull --rebase origin gh-pages; then
              git rebase --abort
              git pull --no-rebase --strategy-option theirs origin gh-pages || true
            fi
            git push origin gh-pages || echo "gh-pages 푸시 실패 (무시)"
          fi
          cd ..

          # worktree 정리
          git worktree remove _ghpages --force || true

          # GitHub Pages URL 출력
          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/reports/${TARGET_DATE}.html"
          echo "GitHub Pages URL: $PAGES_URL"
          echo "pages_url=$PAGES_URL" >> $GITHUB_OUTPUT
          echo "target_date=$TARGET_DATE" >> $GITHUB_OUTPUT
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: MD를 Google Drive에 업로드
        if: success() && steps.check-secrets.outputs.skip != 'true'
        id: drive-upload
        continue-on-error: true
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.custom_date }}
        run: |
          if [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "GDRIVE_FOLDER_ID 미설정, 업로드 건너뜀"
            echo "uploaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$GMAIL_TOKEN" ] || [ -z "$GMAIL_CREDENTIALS" ]; then
            echo "Gmail OAuth 시크릿 미설정, 업로드 건너뜀"
            echo "uploaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 대상 날짜 결정
          if [ "$INPUT_MODE" = "custom" ] && [ -n "$INPUT_DATE" ]; then
            RUN_ID=$(echo "$INPUT_DATE" | tr -d '-')
            TARGET_DATE="$INPUT_DATE"
          else
            RUN_ID=$(TZ='Asia/Seoul' date '+%Y%m%d')
            TARGET_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          fi

          RUN_DIR="output/final/${RUN_ID}"
          MD_FILE=$(find "$RUN_DIR" -name "*_Newsletter_report.md" 2>/dev/null | head -1)
          if [ -z "$MD_FILE" ]; then
            echo "통합 MD 파일 없음, 업로드 건너뜀"
            echo "uploaded=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 파일명 형식: YYMMDD_Newsletter_report.md
          YYMMDD=$(echo "$TARGET_DATE" | sed 's/20\(..\)-\(..\)-\(..\)/\1\2\3/')
          TARGET_NAME="${YYMMDD}_Newsletter_report.md"
          YEAR=$(echo "$TARGET_DATE" | cut -d'-' -f1)

          echo "Drive 업로드: $TARGET_NAME → ${YEAR}/"
          if node scripts/upload_to_drive.js "$MD_FILE" "$TARGET_NAME" "$YEAR"; then
            echo "uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "uploaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Telegram 알림 (링크 전송)
        if: success() && steps.check-secrets.outputs.skip != 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE: ${{ github.event.inputs.custom_date }}
          START_EPOCH: ${{ steps.start-notify.outputs.start_epoch }}
          PAGES_URL: ${{ steps.pages-deploy.outputs.pages_url }}
          PAGES_DEPLOYED: ${{ steps.pages-deploy.outputs.deployed }}
          DRIVE_UPLOADED: ${{ steps.drive-upload.outputs.uploaded }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "TELEGRAM_TOKEN 미설정, 알림 건너뜀"
            exit 0
          fi

          # 소요시간 계산
          END_EPOCH=$(date +%s)
          ELAPSED=$(( END_EPOCH - START_EPOCH ))
          ELAPSED_MIN=$(( ELAPSED / 60 ))
          ELAPSED_SEC=$(( ELAPSED % 60 ))

          # 대상 날짜 결정
          if [ "$INPUT_MODE" = "custom" ] && [ -n "$INPUT_DATE" ]; then
            RUN_ID=$(echo "$INPUT_DATE" | tr -d '-')
            TARGET_DATE="$INPUT_DATE"
          else
            RUN_ID=$(TZ='Asia/Seoul' date '+%Y%m%d')
            TARGET_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          fi

          RUN_DIR="output/final/${RUN_ID}"

          if [ ! -d "$RUN_DIR" ]; then
            MESSAGE=$(printf "[YKS Newsletter Report] 생성 완료\n\n📅 %s\n📊 처리할 뉴스레터가 없었습니다.\n⏱ %d분 %d초" "$TARGET_DATE" "$ELAPSED_MIN" "$ELAPSED_SEC")
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$MESSAGE"
            exit 0
          fi

          LABEL_COUNT=$(find "$RUN_DIR" -name "*_Newsletter_report_*.md" 2>/dev/null | wc -l | tr -d ' ')

          # 메시지 구성: 완료 정보 + 리포트 링크 + Drive 상태
          MESSAGE="[YKS Newsletter Report] 생성 완료"$'\n\n'
          MESSAGE+="📅 ${TARGET_DATE}"$'\n'
          MESSAGE+="📊 ${LABEL_COUNT}개 라벨 처리 완료"$'\n'
          MESSAGE+="⏱ ${ELAPSED_MIN}분 ${ELAPSED_SEC}초"$'\n\n'

          if [ "$PAGES_DEPLOYED" = "true" ] && [ -n "$PAGES_URL" ]; then
            MESSAGE+="🔗 리포트: ${PAGES_URL}"$'\n'
          else
            MESSAGE+="⚠️ GitHub Pages 배포 실패"$'\n'
          fi

          if [ "$DRIVE_UPLOADED" = "true" ]; then
            MESSAGE+="☁️ Obsidian Vault 동기화 완료"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --data-urlencode "disable_web_page_preview=false"

      - name: 에러/타임아웃 알림
        if: failure() || cancelled()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          START_EPOCH: ${{ steps.start-notify.outputs.start_epoch }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "TELEGRAM_TOKEN이 설정되지 않아 에러 알림을 건너뜁니다."
            exit 0
          fi

          # 소요시간 계산
          END_EPOCH=$(date +%s)
          if [ -n "$START_EPOCH" ]; then
            ELAPSED=$(( END_EPOCH - START_EPOCH ))
            ELAPSED_MIN=$(( ELAPSED / 60 ))
            ELAPSED_SEC=$(( ELAPSED % 60 ))
            ELAPSED_STR=$(printf "%d분 %d초" "$ELAPSED_MIN" "$ELAPSED_SEC")
          else
            ELAPSED_STR="-"
          fi

          TARGET_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          LOG_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$JOB_STATUS" = "cancelled" ]; then
            STATUS="타임아웃"
          else
            STATUS="에러"
          fi

          MESSAGE=$(printf "[YKS Newsletter Report] 생성 실패\n\n📅 %s\n❌ 상태: %s\n⏱ %s\n\n🔗 <a href=\"%s\">로그 확인</a>" "$TARGET_DATE" "$STATUS" "$ELAPSED_STR" "$LOG_URL")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MESSAGE" \
            -d parse_mode=HTML
